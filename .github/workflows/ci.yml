name: CI

# ruff + mypy + pytest (incl. the G1–G12 abstraction gates) on every push and PR (master §5, §6).
# A shortcut that bypasses the abstraction design fails HERE, not in review.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend + dev deps
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (types)
        run: mypy

      - name: Pytest (unit + G1–G12 gates)
        run: python -m pytest
