# config/observables.yaml — declarative tripwires (spine/08 §3.8; spine/09). An observable is a condition
# over existing node/edge attrs + precomputed metrics — no new code. Validates against F0
# ObservablesConfig{observables: list[ObservableDef{observable_id, subject?, trigger, severity, disposition}]}.
# Lifecycle: define -> arm (evaluate on save) -> fire on next rebuild() -> disposition feeds tuning.
observables:
  # SEEDED PRIMARY — the flagship relocation tripwire. It declares only WHO is watched and WHAT CLASS OF
  # CHANGE counts; it does NOT name the origin site, the destination site, or the year. A tripwire that
  # names its own destination is confirming a relocation, not detecting one — and it would fire exactly
  # once, on the one move we already knew about. The sites appear in the FIRED ALERT, never here.
  # (EVAL RCA D-P4.10; the earlier version pinned unit/from_site/to_site/window off answer_key.json.)
  - observable_id: obs-basing-relocation
    subject: lens-hq9p-pk
    watch_instances: [unit_hq9b]   # the watched resolved instance — the ONE scope channel (spine/08 §3.8)
    trigger:
      "on": occupancy_state_change
      edge_type: based-at
      match_on: [resolved_unit, site_instance]   # one wire per resolved unit; the SITE is the tracked state
      anchors_within_hops: 0   # the watched instances + the lens anchors THEMSELVES — do not spread the
                               # wire across the lens neighbourhood (that is how a manufacturer's address
                               # change used to trip a unit-relocation tripwire). Raise it to widen recall.
    severity: notify
    disposition: [real, noise, needs-more]

  # CONFIG-ONLY SECONDARIES — armed but NOT wired into the narrative (proves observables are declarative,
  # not hardcoded). No UI/demo-script hooks. NOTE: these still carry forward-looking keys (`from_type`,
  # `to_type`, `event_subtype`, `source_class`, `implies_edge`, `target_status_ceiling`) that the current
  # engine does not read. That is no longer silent — `explain()` lists them under `unconsumed_keys` and
  # the analyst's confirm screen says so, so a key can never quietly mean nothing.
  - observable_id: obs-followon-interceptor-order
    subject: lens-hq9p-pk
    trigger:
      "on": new_edge
      edge_type: replenishes
      from_type: contract_import_event
      to_type: interceptor_stockpile
      match_on: [resolved_contract, resolved_stockpile]
      event_subtype: follow-on-order
    severity: notify
    disposition: [real, noise, needs-more]

  - observable_id: obs-spares-tender-probable-induction
    subject: lens-hq9p-pk
    trigger:
      "on": new_claim
      source_class: customs-tender
      implies_edge: sustained-by
      target_status_ceiling: probable    # criterion-7 ceiling — a tender can never auto-confirm
      match_on: [resolved_unit]
    severity: notify
    disposition: [real, noise, needs-more]
