# config/ontology.yaml — HQ-9/P (Use Case C) demo-scope ontology.
# Schema-designed, instances-discovered (DECISIONS). Validates against F0 OntologyConfig
# {node_types, edge_types, event_types}: list[TypeDef{name, freshness_class?, attrs[]}] (extra="allow").
#
# Ratified data-agent decisions applied (tmp/conv/DATA-C-corpus-and-oracle-observations.md):
#   - supplies-component reserved for Manufacturer->Component; the Component->Variant hero edge is `equips`.
#   - sustainment SPLIT into interceptor_stockpile (perishable) + techdata_authority (durable/force-reval).
#   - NO candidate-* edge types: candidate-ness is a computed edge STATUS (possible), never an edge type.
#   - variant-of DROPPED (family carried as a Variant attr); no dangling family node.
#   - imported-via DROPPED (Contract carries variant_delivered + linked_unit attrs; hero trace doesn't need it).
#   - functional_role values are identifiers; Variant.branch -> operator_branch.
# freshness_class buckets (spine/04): durable | perishable | semi-durable | force-revalidated | n/a.
# credibility.yaml half_lives_days is keyed by the precise edge NAME (these categories are documentation).
#
# Canonical edge direction (INGEST canonical-edge-direction, 2026-07-19): each directional edge below
# declares its endpoints as machine-readable `from`/`to` node-types (promoted from the human `# X->Y`
# comments), read by `chanakya.edge_direction` so every producer writes a given edge the same way and
# oppositely-phrased claims of one fact co-locate on one edge and corroborate. Both are optional: a
# polymorphic-object edge (sustained-by) declares only `from` (the fixed end is enough to detect a flip;
# manufactures is now Mfr->Variant per D-A, no longer from-only); a same-type edge (component-of) cannot be
# type-disambiguated and is left as written.
# Structural / symmetric edges (same-as, corroborates, supersedes, …) set `symmetric: true` — they have
# no natural direction and are never reoriented (extra="allow", so these are plain YAML fields, no F0
# schema change).
#
# Chokepoint direction (EVAL RCA D-P4.7): each sustainment edge declares `supplier_end: from|to` — which
# endpoint holds the *supplier* (the node that fails the sustainment if it disappears). For most edges the
# supplier is the `from` end, but `exported-by` (Contract->Manufacturer) puts it on the `to` end. Read by
# `chanakya.ontology.EdgeLaneIndex.supplier_end` so materiality tests sole-source in-degree on the
# *dependent* end yet attaches the chokepoint finding to the *supplier* end (one direction of truth).
#
# Edge-instance identity (EVAL RCA D-P4.4 / §2.1; preflight-audit :245-256): each edge declares which of
# its endpoints form the SUPERSEDE/relocation *instance key* via `instance_key: [from]` / `[from, to]`.
# The default (omitted) is `[from, to]` — a MULTI-VALUED edge (a variant has many components) keys on
# subject+object, so each object is its own instance. A FUNCTIONAL / single-valued-over-time edge (a unit
# is based at one site at a time) keys on the SUBJECT only, so a relocation's before-edge and after-edge
# share one instance and `view.supersede` can see both targets. Only `based-at` is functional today; when
# a state edge is unsure, leave the default. Read by `EdgeLaneIndex.instance_key` and built into the key
# by `EdgeLaneIndex.edge_instance_key`, used by BOTH producers (resolve.entities.base_ref and the
# view.pipeline fallback) so they can never disagree. SUB-SCOPE LIMITATION: `based-at` is truly single-
# valued per (unit, site_TYPE) — a unit at a garrison AND a forward field site at once is two valid
# instances, not a supersede. Subject-only keying is correct while the corpus has no such simultaneous
# pair (the relocation beat is one unit, one site_type: Rawalpindi->Rahwali); tagging the key by site_type
# is a Tier-4 refinement to land when the derivation stamps site_type (see the xfail in test_supersede).

node_types:
  - name: manufacturer
    freshness_class: durable
    attrs: [role, tier, foreign_control, named_examples, production_rate, export_agent, place_ref]
  - name: trading_org           # ING-3: generic trading / intermediary / freight org (a customs consignee /
    freshness_class: durable    # shipper / export-agent shell) — NOT an OEM. `manufacturer` is reserved for real makers.
    attrs: [role, origin_country, foreign_control, place_ref]
  - name: component
    freshness_class: durable
    # functional_role identifiers: acquisition | battle_management | engagement_fire_control | interceptor
    attrs: [component_class, functional_role, model_designation, radar_band, host_chassis, observable_fingerprint, foreign_control]
  - name: variant
    freshness_class: durable
    # family retained as an attr (e.g. "HQ-9"); operator_branch replaces the old `branch`.
    attrs: [family, base_designator, export_designator, aliases, range_class, range_km, operator_branch, associated_rounds, associated_radars]
  - name: contract_import_event
    freshness_class: durable
    attrs: [event_subtype, quantity, count_state, variant_delivered, linked_unit, evidence_date]
  - name: unit
    freshness_class: durable
    attrs: [echelon, designator, service_branch, parent_unit, equipment_fingerprint, count_state, home_garrison]
  - name: basing_site
    freshness_class: durable       # the site is durable; occupancy perishability lives on the based-at edge
    attrs: [coordinates, site_type, site_signature_geometry, occupancy_state, occupancy_observed_date, decoy_risk_flag]
  - name: interceptor_stockpile    # SPLIT from sustainment — perishable (depth/consumption move fast)
    freshness_class: perishable
    attrs: [stocked_round, magazine_depth, consumption_rate, days_of_supply, resupply_lead_time, production_sole_source_flag, foreign_control]
  - name: techdata_authority       # SPLIT from sustainment — durable / force-revalidated
    freshness_class: force-revalidated
    attrs: [holds, foreign_control]  # holds ∈ TDP | firmware | crypto-keys | calibration-ref
  - name: source
    freshness_class: n/a
    attrs: [source_type, primary_origin_id, aggregator_of, bias_vector, coordinated_inauthenticity_flag, adversary_denial_flag, reliability_grade, citation_url]
  - name: indicator
    freshness_class: n/a
    attrs: [indicator_class, lifecycle_stage, observation_date, valid_time, resolved_entity_ref, edge_instance_ref, artifact_integrity, first_seen, caption_vs_image_consistency, evidentiary_strength]
  - name: known_gap
    freshness_class: n/a
    # observability_ceiling ∈ confirmable | probable-max | never-observable  (HYPHENATED per frozen view.py)
    attrs: [observability_ceiling, next_coverage_due, related_ref, missing_slots]

# Edge domain/range (D-A, DECISIONS §6 "EVAL"): every `extractor: true` edge is uniquely determined by
# its (from -> to) node types, so a write-time re-lane (chanakya/ontology.py) puts an asserted fact on
# the edge its endpoints imply regardless of the verb the LLM chose, and rejects endpoints that fit no
# edge instead of minting an ad-hoc predicate. `manufactures` is TIGHTENED to Mfr->Variant so it no
# longer collides with `supplies-component` (the sole Mfr->Component edge). `symmetric` edges + the
# non-`extractor` edges are NOT LLM-asserted: same-as/distinct-from go through the merge channel; the
# evidence/derived edges are synthesized by RESOLVE/SCORE/MONITOR. NB: this makes Mfr->Component always
# `supplies-component`; the oracle's two `manufactures`->component edges get reconciled separately
# (answer_key task) — see tmp/conv/PHASE1-DATAC-EVAL-answer_key-reconciliation.md.
edge_types:
  # flagship trace — extractor-emittable relationship edges (the extraction enum), unique (from -> to);
  # edge_direction.py also reads these from/to for write-time direction canonicalization (both mechanisms,
  # one source of truth). manufactures is TIGHTENED to Mfr->Variant (D-A) so Mfr->Component is unambiguously
  # supplies-component; the oracle's two manufactures->component edges reconcile separately (answer_key task).
  - {name: based-at,             from: unit,                  to: basing_site,             extractor: true, freshness_class: perishable, instance_key: [from]}    # Unit->Site (field 30d / garrison 18mo); FUNCTIONAL — key the supersede instance on the unit alone so a relocation's before/after co-locate (D-P4.4)
  - {name: inducted-into,        from: variant,               to: unit,                    extractor: true, freshness_class: semi-durable}  # Variant->Unit
  - {name: imported-by,          from: contract_import_event, to: unit,                    extractor: true, freshness_class: durable}       # Contract->Unit
  - {name: exported-by,          from: contract_import_event, to: manufacturer,            extractor: true, freshness_class: durable, supplier_end: to}    # Contract->Manufacturer/export-agent (supplier = the exporter/OEM at the `to` end)
  - {name: equips,               from: component,             to: variant,                 extractor: true, freshness_class: durable, supplier_end: from}  # Component->Variant (hero); the component is the supplier
  - {name: supplies-component,   from: manufacturer,          to: component,               extractor: true, freshness_class: durable, supplier_end: from}  # Manufacturer->Component (sole Mfr->Component edge); the maker is the supplier
  - {name: manufactures,         from: manufacturer,          to: variant,                 extractor: true, freshness_class: durable, supplier_end: from}  # Manufacturer->Variant (TIGHTENED; Mfr->Component re-lanes to supplies-component)
  - {name: design-authority-for, from: techdata_authority,    to: variant,                 extractor: true, freshness_class: durable, supplier_end: from}  # techdata_authority->Variant; the authority is the supplier
  - {name: component-of,         from: component,             to: component,               extractor: true, freshness_class: durable, supplier_end: from}  # deep-tier BOM (Component->Component; sub-component is the supplier of the parent)
  - {name: replenishes,          from: contract_import_event, to: interceptor_stockpile,   extractor: true, freshness_class: perishable}    # Contract->stockpile (follow-on resupply; observable)
  # derived / rollup — NOT extractor-emitted (synthesized by SCORE/MONITOR/RESOLVE)
  - {name: sustained-by,         from: unit,                  freshness_class: n/a}                          # object polymorphic: interceptor_stockpile | techdata_authority — rollup only (edge_direction: from-only)
  - {name: supersedes,           freshness_class: n/a, symmetric: true}                                      # derived (site relocation); never reoriented
  - {name: derived-from,         freshness_class: n/a, symmetric: true}                                      # derived-layer provenance
  # resolution — NOT extractor-emitted (same-as/distinct-from route through the MERGE channel, not triples)
  - {name: same-as,              freshness_class: n/a, symmetric: true}
  - {name: distinct-from,        freshness_class: n/a, symmetric: true}
  # in-document coreference (INGEST extraction pass 2, ingest/coref.py) — NOT extractor-emitted. On a lane
  # of its own, deliberately NOT `same-as`: resolve.scoring reads same-as/aka/... as one weighted term of
  # merge_score, so writing it there would dilute a context-licensed extractor decision into a partial score
  # attribute-dissimilarity can outvote. Inert to today's scorer; the RESOLVE honor policy keys on this.
  - {name: coref-same-as,        freshness_class: n/a, symmetric: true}
  - {name: substitutable-by,     freshness_class: semi-durable, symmetric: true}                             # three-state on the edge; only UNKNOWN seeded (roadmap)
  # evidence layer — NOT extractor-emitted (structural, never reoriented)
  - {name: evidenced-by,         freshness_class: n/a, symmetric: true}
  - {name: corroborates,         freshness_class: n/a, symmetric: true}
  - {name: contradicts,          freshness_class: n/a, symmetric: true}

event_types:
  - {name: TransferEvent, freshness_class: durable}
  - {name: InductionEvent, freshness_class: durable}
  - {name: SightingEvent, freshness_class: durable}
  - {name: ExerciseEvent, freshness_class: durable}

# Materiality knobs (SCORE precompute; C/01). `function_attr` is the node attr that partitions a
# dependent's sole-source count by *function*: a variant equipped by one acquisition radar + one
# engagement radar + one launcher has three sole-source functions (each a SPOF), not in-degree 3 on a
# single `equips` lane. Absent on a supplier node → that edge falls back to per-edge-type counting.
materiality:
  function_attr: functional_role
