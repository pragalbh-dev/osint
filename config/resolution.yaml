# config/resolution.yaml — relational entity-resolution knobs (spine/08 §3.9; md/05 §4; md/13).
# Validates against F0 ResolutionConfig {merge_weights, bands, blocking_keys, alias_table, transliteration}
# (+ extra knobs, extra="allow"). RESOLVE consumes this; the seeded alias table grows from HITL merges.

# merge_score = Σ w·signal (spine/08 §3.9). TUNED 2026-07-19 (P3.3) to a stated invariant rather than to a
# list of example pairs: EITHER a perfect name/attribute match alone OR a perfect shared-neighbourhood match
# alone must reach the analyst, and NEITHER alone may merge.
#   name only        0.40·1 + 0.40·0 + 0.05·1 + 0.15·0 = 0.45 == hitl_low  -> always queued
#   neighbourhood    0.40·0 + 0.40·1 + 0.05·1 + 0.15·0 = 0.45 == hitl_low  -> always queued
#   deterministic ceiling (everything except the raise-only identity term) = 0.85 == auto_merge, so the
#   fuzzy path can only auto-merge on SIMULTANEOUS perfection; in practice auto-merges come from the
#   bootstrap rules (hard id / alias class / exact name / containment), which is precision-first by design.
# What moved and why: `temporal_consistency` was a constant 1.0 on every non-relocation pair, i.e. a hidden
# +0.15 floor under every score — which made the printed hitl_low of 0.55 behave like 0.40. It is kept as a
# LIVE discriminator (a relocation pair still scores 0 on it) but shrunk to 0.05, and the freed weight went
# to `attribute`; hitl_low then drops to 0.45 so effective strictness is UNCHANGED (0.55−0.15 = 0.45−0.05).
# The numbers now mean what they say. `relational` (the collective-ER signal) and `source_asserted` are
# untouched, and no new auto-merge fires at these weights.
merge_weights:
  attribute: 0.40
  relational: 0.40
  temporal_consistency: 0.05
  source_asserted: 0.15

bands:                    # score ≥ auto_merge -> auto; [hitl_low, auto_merge) -> HITL; < hitl_low -> keep separate
  auto_merge: 0.85
  hitl_low: 0.45

blocking_keys:            # candidate generation scope (demo scale: all-pairs-within-block is fine)
  - type
  - country_or_domain_namespace
  - name_token

alias_table:              # canonical -> [known aliases]. SEEDED (auto-merge-eligible). Grows from HITL.
  # --- HQ-9 family (the subject) ---
  "HQ-9/P":
    - "HQ-9P"
    - "FD-2000"           # export designator = HQ-9/P (auto-merge; the seeded merge card)
    - "HIMADS"            # Pakistani service nickname
  "HQ-9":
    - "Hongqi-9"
    - "红旗-9"
    - "紅旗-9"
  "HHQ-9":
    - "海红旗-9"
  # --- Manufacturers / design authorities ---
  "CASIC Second Academy":
    - "2nd Academy"
    - "Second Academy"
    - "China Academy of Defense Technology"
    - "China Changfeng Group"
    - "CCFG"
    - "航天科工二院"
  "Beijing Institute of Radio Measurement":
    - "BIRM"
    - "23rd Research Institute"
    - "23rd Institute"
    - "北京无线电测量研究所"
  # --- S-400 (design-note reference subject; kept minimal — the transliteration marquee) ---
  "S-400 Triumf":
    - "Triumph"
    - "С-400 Триумф"
    - "SA-21 Growler"
  # NOTE (place aliases): config/places.yaml is the authoritative gazetteer for place resolution
  # (md/13 §2). Do NOT duplicate place aliases here.
  # WITHHELD (earned-merge traps — must NOT be seeded here or in places.yaml):
  #   - "Chaklala" / "PAF Base Chaklala" / "RAF Chaklala"  -> pl_nurkhan (earn via ICAO OPRN + proximity, md/13 §6)
  #   - "H-200" -> "HT-233"  -> ORPHAN alias to VERIFY (a candidate, not an assumption); the LLM candidate-gen
  #     recall demo (spine/08 §3.11). Left OUT of the seed on purpose; data agent verifies the mapping first.

transliteration:          # script -> latin (rule-based normalizer seed; spine/08 §3.9, md/13 §2)
  "Триумф": "Triumf"
  "红旗-9": "Hongqi-9"
  "紅旗-9": "Hongqi-9"
  "海红旗-9": "HHQ-9"
  "防盾-2000": "FD-2000"
  "航天科工二院": "CASIC Second Academy"
  "北京无线电测量研究所": "Beijing Institute of Radio Measurement"

# ── extra knobs (extra="allow") ─────────────────────────────────────────────────────────────────
# Identity read from the CLAIM STREAM, source-weighted (D-2.5 / D-P3.4). A `same-as` is ordinary evidence,
# so its weight in merge_score's `source_asserted` term is R(asserting source) — the credibility rubric's
# own output (sources.yaml class x credibility.yaml factors), never a second, divergent scale.
identity_source_weight_default: 1.0  # weight for a source the registry has never heard of. Neutral is safe
                                     # because a same-as is structurally raise-only: HITL, never auto-merge.
identity_raise_min_weight: 0.0       # min R for a same-as to be worth an analyst's time. 0.0 = surface them
                                     # all (recall-biased triage); raise it if the merge queue ever floods.

# In-document coreference (INGEST extraction pass 2, ingest/coref.py): which evidence categories may
# BOOTSTRAP (auto-merge) rather than merely raise. This is the one signal allowed past the raise-only rule
# above, because it is qualitatively different: the extractor read THIS document's own discourse and must
# quote the span that licenses the grouping — information no string comparison downstream can recover.
#
# Only EXPLICIT_EQUIVALENCE is opted in: the document literally *states* the identity ("Full Name (SHORT)",
# "also known as", an apposition). NAME_VARIANT and UNAMBIGUOUS_ANAPHOR are the extractor *interpreting*
# rather than the document asserting, so they stay raise-only and reach the analyst queue with their quote.
# Empty list => everything coreference proposes is raise-only (Phase-3 D-2.5 behaviour, unchanged).
#
# Still gated by every other rail: a distinct-from veto drops the pair outright, and a type / namespace /
# hard-attribute contradiction demotes it to the queue instead of merging.
#
# SHIPPED EMPTY — every coreference cluster is raise-only, i.e. Phase-3 D-2.5 behaviour, unchanged. Two
# reasons, and the second is the sharp one:
#   1. Independent switches. The producer (credibility.yaml -> coreference) is dormant; if this were
#      pre-set, enabling the producer would silently switch auto-merging on in the same motion.
#   2. A known collision. d10_sat_cloud_gap states "HT-233 (H-200) engagement radar" — textbook
#      EXPLICIT_EQUIVALENCE — but that orphan alias is a deliberate demo beat an analyst is meant to EARN
#      (see cluster._descriptor_extension). Auto-merging it would silently delete the beat. Raise-only
#      keeps it: the pair reaches the queue WITH its licensing quote, so the human still decides but is
#      handed the exact sentence. Measure the false-merge rate on the frozen scenarios before opting in.
#
# To opt in (deliberately, with the producer): coref_authoritative_evidence: [EXPLICIT_EQUIVALENCE]
coref_authoritative_evidence: []

# Open-world name triggers (P3.3): the tail the alias table + entity registry have NEVER seen — a document
# naming the same thing more verbosely, or by its initials. Both are high-precision BOOTSTRAP rules, so
# these gates are what keep them honest. Unset => the trigger is simply off.
containment_min_descriptor_len: 3    # "HT-233" + "engagement" (a WORD) is the same radar described more
                                     # fully; "HQ-9" + "P" (a MARK) is a different missile. The knob is the
                                     # length of the first token the longer name adds.
containment_min_short_tokens: 2      # ...and the SHORT side must be more than one bare word. "China" is a
                                     # prefix of half the manufacturer list and bridged CPMIEC into CASIC;
                                     # "Pakistan" walks straight at the PAAD-vs-PAF unit trap. A one-word
                                     # hook is ambiguous evidence -> it belongs in the queue, not a merge.
acronym_min_len: 3                   # "PAAD" == the initials of "Pakistan Army Air Defence". Under three
                                     # letters an initialism collides with far too much to bootstrap on.

high_alias_risk_types:    # blocks of these types get the LLM candidate-gen recall pass (spine/08 §3.11)
  - variant
  - component
  - unit
  - manufacturer

orphan_block_threshold_k: 2      # fire LLM candidate-gen only when deterministic_candidate_count < k (authored default)
llm_candidate_gen:
  max_calls_per_rebuild: 20      # authored budget cap (spine/08 §3.11 "cap by config budget; log skips")
  batch_per_orphan: true
  log_skips: true

place_proximity_radius_m:        # from config/places.yaml (md/13) — same-place merge radius by precision class
  pad: 500
  site: 1500
  terminal: 3000
  district: 5000
  city: 15000
  province: 150000                 # an admin-level-1 area; an envelope, never a merge target (T5)
place_proximity_hitl_multiplier: 3   # 1x-3x radius -> HITL; beyond -> new place (places.yaml)

# Which gazetteer precision classes may CONSTITUTE identity — i.e. when "these two mentions resolved to
# the same anchor" is allowed to become "these two mentions are the same place" (places.augment). The
# area rungs are deliberately excluded: two batteries both described as being in Punjab, or both "in
# Karachi", are not one battery, and auto-fusing them on a shared province would corrupt the ORBAT far
# more cheaply than it could ever enrich it. Coarse anchors still resolve, still carry a place_ref, and
# still place the node on the map inside an honest envelope — they simply never merge anything.
# Absent / empty => unconstrained, i.e. the pre-T5 behaviour byte-for-byte (gate G2).
place_identity_precision_classes: [pad, site, terminal]

# ── place-matching gates (P3.5 / RES-5) ─────────────────────────────────────────────────────────
# The radii above are JITTER absorption: a coord a few hundred metres off is the same pad. With no
# compatibility gate around them, jitter absorption becomes GARBAGE absorption — an "Army Air Defence
# Centre" sitting 4.5 km from the Port of Karachi was being pulled into a container terminal. These two
# gates apply to the PROXIMITY path only: a hard ID (ICAO/LOCODE) or an exact toponym/alias match states
# identity outright, and gating those would also disarm the Karachi-Port != Port-Qasim trap (both ports
# have to resolve before the gazetteer's distinct_from can veto them apart).
#
# What an entity type may be pulled onto. A statement about the WORLD (an air-defence site is not a
# port), so it is config, not code. A type with no row here (and no `default` row) is unconstrained.
place_allowed_precision_classes:
  basing_site: [pad, site]     # a battery/base snaps to a pad or a site — never a port terminal, and
                               # never a district/city (those are AREAS; snapping to one is a fiction).

# A vague geocode must not be snapped into a precise pad: "central Punjab" geocodes to a fuzzy regional
# point, and INGEST records how much it trusts each candidate. Below this floor the mention keeps its own
# coordinate and stands as an honest pin. A candidate with NO stated confidence is UNKNOWN, not low —
# RESOLVE does not invent doubt INGEST never expressed (the class gate above still applies to it).
place_min_geocode_confidence: 0.6

# A toponym is a NAME, not a description of where something is. A display string carrying one of these
# markers ("Malir District, Karachi, Sindh Province, Pakistan"; "Air Defence Depot, ~12 km NNW of Kala
# Chitta / Attock Cantt area") is not usable as a place name — RESOLVE falls back to INGEST's frozen
# proposed_alias, and otherwise matches on coordinates/hard-ID alone. Empty => every name is accepted.
toponym_descriptive_markers: [",", "~", "/", " km "]

# May a mention carrying NO coordinate bind to an anchor whose curated name it states EXACTLY? Yes (P3.6).
# "PAF Base Nur Khan" is a seeded alias of pl_nurkhan, so a document using that string is naming an
# analyst-curated anchor, not inferring one from distance — the same precision standard the entity alias
# table already merges on. It matters because a grid reference frozen unparsed leaves the entity with no
# point at all, and the origin end of the Rawalpindi -> Rahwali relocation would otherwise render
# unanchored. EXACT curated canonical_name/alias only: no fuzzy, no substring, no proximity — so the
# withheld earned-merge traps ("Chaklala" / "PAF Base Chaklala" / "RAF Chaklala"; Rahwali's relative-
# bearing form) stay EARNED-only, and vague mentions ("Sargodha", "central Punjab") still bind to
# nothing. The gazetteer's distinct_from veto applies to these matches exactly as to any other.
# false / absent => off.
place_bind_on_curated_toponym: true

# Non-place keep-separate traps (the geographic Karachi-Port vs Port-Qasim pair lives in places.yaml's
# own distinct_from field — intentionally NOT duplicated here).
distinct_from:
  "HQ-9/P":
    - "FT-2000"            # anti-radiation variant — false-merge trap (HITL band)
    - "HQ-9BE"             # flagship distinct-from: ~125 km Army vs ~260 km PAF
