# config/entities.yaml — entity canonical-id registry (D-B; pipeline config, extensible; per CLAUDE.md
# not hardcoded).
#
# This is the pipeline's PRIOR for entity resolution — mirrors config/places.yaml's role for places, one
# level up the stack (entities, not locations):
#   - each entry's entity_id is the STABLE canonical id RESOLVE elects as a cluster's canonical node id,
#     and it is the SAME id the eval oracle (each scenario's answer_key.json) uses — so extractor surface
#     forms, the resolved graph, subject lenses, and the oracle all share one id namespace (closes the
#     id-namespace split, D-B).
#   - the extractor NEVER emits these ids; it only ever emits a surface form + a type. RESOLVE maps
#     surface -> id via this table's alias-equivalence classes, with fuzzy/attribute scoring + HITL
#     covering everything this table hasn't seen yet.
#   - a curated OPEN-WORLD prior, not a closed vocabulary: an entity this table has never seen still mints
#     its own node at rebuild. This table only pre-resolves the surface forms we already know about, and it
#     GROWS over time from HITL adjudications and auto-merges — exactly like places.yaml's gazetteer grows
#     from earned merges.
#
# NOT the answer key. The eval oracle (full ground truth, incl. which aliases are withheld on purpose)
# lives in each scenario's answer_key.json. Two deliberate omissions below mirror places.yaml's own
# withheld/earned-merge traps and MUST stay withheld here too (do not "complete" them):
#   * site_rawalpindi: the historical "PAF Base Chaklala" / "Chaklala" / "RAF Chaklala" aliases are
#     WITHHELD — same earned-merge story as places.yaml's pl_nurkhan (ICAO co-reference + proximity, or an
#     LLM alias proposal -> HITL, not a free string lookup).
#   * site_rahwali: the "~N km NW of <town>" relative-bearing form is deliberately NOT seeded as a string
#     alias here either (places.yaml withholds the coordinate form for the same node) — it must resolve by
#     geodesic proximity against the seeded coordinate, not by string match.
#
# Only CONFIRMED, corpus-attested (or explicit oracle-name) aliases are seeded here — never a corpus's own
# hedged "candidate to verify" surface forms (e.g. H-200 / Type 305B / FD-2000B for the HT-233/HQ-9P
# cluster), and never a bare generic noun that would be actively harmful as a blind GLOBAL alias (e.g.
# "Pakistan Army", "the System") even where a single document's own local scope treats it as a defined
# term. Coordinate/MGRS/DMS strings are excluded too — those resolve through the deterministic
# coord-canonicaliser + proximity match (places.yaml), never this name-alias table.
#
# distinct_from carries the do-not-merge traps (Army-designated HQ-9/P vs PAF-designated HQ-9BE; either of
# those vs the FT-2000 anti-radiation variant; the PAAD Army unit vs the PAF fire-unit) as a hard veto,
# applied before banding — the same mechanism places.yaml uses for its Karachi-Port/Port-Qasim pair.
#
# DEFERRED — attrs.foreign_control / DC-3 materiality seeding is intentionally NOT set here. A prior
# corpus-grounding analysis (tmp/conv/EVAL-RCA-corpus-grounding-basing-and-materiality.md, Item 2) found
# the corpus never states a sole-source / foreign-control fact for HT-233 — its maker is graded UNKNOWN
# (gap_ht233_maker) — so hand-seeding foreign_control: true to force a CONFIRMED chokepoint would be
# un-sourced and would violate the traceability non-negotiable (no node/edge without a source that says
# it). The honest grounding (hedged techdata-authority configuration-control d21 / no-open-substitute
# chassis d24, landing at PROBABLE with hedges preserved) is a Phase-2/3 DATA+EVAL corpus-vs-oracle
# reconciliation — see tmp/conv/PHASE1-DATAC-EVAL-answer_key-reconciliation.md — not a Phase-1 config seed.
#
# Entities with zero confirmed corpus-attested aliases in this scenario (comp_interceptor, import_2021,
# sustain_techdata, sustain_spares) are deliberately NOT seeded here — they are real oracle ids, but
# registering them with an empty alias list would add nothing (RESOLVE still mints/matches them by type +
# relational signal); see tmp/conv/eval-rca/phase1-entity-registry-draft.md §1/§4 for the coverage-gap
# writeup.

