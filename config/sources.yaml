# config/sources.yaml — the source registry (spine/04 §3.5; master §4.2). Validates against F0
# SourcesConfig{sources: list[SourceRegistryEntry]}. This is source-INTRINSIC signal only (class,
# reliability, independence, cadence, bias) — NEVER a graded verdict (those live in answer_key.json,
# which the pipeline never reads).
#
# `source_type` uses the SAME vocabulary as credibility.yaml `source_class_factors` keys, so SCORE
# computes R via a direct source_class_factors[source_type] lookup (no mapping layer).
# `cadence` drives sufficiency's next_coverage_due: "Nd" = periodic revisit; "event-driven" / "continuous"
# / "irregular" / "per-tender" have no fixed clock. Encoded traps (as DATA, not verdicts): SIPRI aggregator
# collapse (d01), ISPR+Global Times aligned-interest (d02/d15 share operator/exporter-state sides),
# adversary-denial gate (d16). NOTE: `decoy-risk` is a CLAIM-level gate (single-pass imagery), carried on
# the assertion's gate_flags — not a source field — so it is absent here by design (e.g. d18, d20, cx01).
