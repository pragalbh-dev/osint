# config/credibility.yaml — Confidence Resolver config (spine/04; spine/08 §3.4-§3.6).
# Validates against F0 CredibilityConfig {factor_weights, source_class_factors, integrity_penalties,
# thresholds, half_lives_days} (+ extra `gates`, allowed by extra="allow"). Every numeric knob lives
# here, never in code (gate G6). R(source) is the rubric's OUTPUT (factor_weights x source_class_factors),
# never a hand-typed per-class constant — the R values in comments are sanity-check outputs, not inputs.
# source_class_factors keys == sources.yaml `source_type` values (SCORE does a direct lookup, no mapping).

factor_weights:
  authority: 0.35
  process: 0.30
  directness: 0.10
  track_record: 0.10          # held at neutral prior (0.5) for the demo — dynamic per-source rating is a roadmap seam
  intrinsic_plausibility: 0.15 # held at ceiling (1.0) for the demo — only a per-claim LLM DOWNWARD override lowers it

source_class_factors:
  curated-register:      {authority: 0.95, process: 0.95, directness: 0.30, track_record: 0.50, intrinsic_plausibility: 1.0}  # R≈0.85 (SIPRI)
  satellite:             {authority: 0.90, process: 0.85, directness: 0.90, track_record: 0.50, intrinsic_plausibility: 1.0}  # R≈0.86
  official:              {authority: 0.90, process: 0.50, directness: 0.90, track_record: 0.50, intrinsic_plausibility: 1.0}  # R≈0.75 (ISPR)
  think-tank:            {authority: 0.60, process: 0.85, directness: 0.25, track_record: 0.50, intrinsic_plausibility: 1.0}  # R≈0.69 (CSIS/RAND/IISS)
  trade-media:           {authority: 0.50, process: 0.75, directness: 0.35, track_record: 0.50, intrinsic_plausibility: 1.0}  # R≈0.64 (Quwa/Jane's)
  customs-tender:        {authority: 0.55, process: 0.55, directness: 0.55, track_record: 0.50, intrinsic_plausibility: 1.0}  # R≈0.61
  exporter-state-media:  {authority: 0.60, process: 0.80, directness: 0.50, track_record: 0.50, intrinsic_plausibility: 1.0}  # R≈0.70 (Global Times; authored, not doc-anchored)
  named-social:          {authority: 0.15, process: 0.10, directness: 0.70, track_record: 0.50, intrinsic_plausibility: 1.0}  # R≈0.35
  anon-social:           {authority: 0.05, process: 0.05, directness: 0.20, track_record: 0.50, intrinsic_plausibility: 1.0}  # R≈0.25

integrity_penalties:
  # Flattened "<table>.<flag>" keys (4 M4 tables -> one flat dict[str,float], the frozen field's type).
  # SCORE lookup: integrity_penalties.get(f"{table}.{flag}", 1.0) per table, then multiply the four
  # results. Missing key -> 1.0 (no penalty) so an absent signal never silently zeroes credibility.
  artifact_integrity.unaltered: 1.0
  artifact_integrity.unverifiable: 0.85
  artifact_integrity.edited: 0.30
  artifact_integrity.synthetic: 0.10
  first_seen.original: 1.0
  first_seen.recycled: 0.30
  caption.consistent: 1.0
  caption.uncheckable: 0.9
  caption.mismatched: 0.30
  coordinated_inauthenticity.independent: 1.0
  coordinated_inauthenticity.suspected: 0.5
  coordinated_inauthenticity.too_clean: 0.4

# GATES, not multipliers (spine/04; DECISIONS). Extra field. SCORE reads gate_flags
# (schemas/stage_io.py AssertionInput.gate_flags: "adversary-denial","decoy-risk") against this map.
gates:
  adversary_denial:
    flag: adversary-denial
    exclude_from_grouping: true    # never enters an independence group -> never corroborates
    cap_at_probable: true          # caps the affected assertion at PROBABLE even if math clears 0.80
  decoy_risk:
    flag: decoy-risk
    exclude_from_grouping: false    # single-pass imagery still counts as a look — only the STATUS is capped
    cap_at_probable: true          # single-pass basing can never reach CONFIRMED

thresholds:
  confirmed: 0.80
  probable: 0.50
  # "possible" has no separate cutoff: assessable AND assertion_confidence < 0.50.

# ── SCORE resolver knobs (introduced by SCORE; DATA-C owns/tunes the values) ──────────────────────
# Every numeric knob the Confidence Resolver reads lives here, never in code (gate G6).
decay_base: 2                 # freshness = decay_base^(-age/half_life) → exactly halves at one half-life
min_independent_groups: 2     # ≥2 independent looks required to reach `confirmed`
same_class_weight: 0.5        # a same-discipline ("same-class-but-passing") corroborating look = half weight
pdq_recycled_hamming: 10      # PDQ Hamming radius under which a re-seen image counts as recycled (first_seen)
aligned_bias_vectors: [operator-state, exporter-state]  # parties to the deal → interest-dependent (one look)
disciplines: {satellite: IMINT}   # source_type → collection discipline (default: textual)
gated_attrs: [foreign_control, readiness]  # must be KNOWN (not UNKNOWN) for an element to reach `confirmed`

half_lives_days:
  # Convention: 1 month = 30d, 1 year = 365d. A type/sub-key with NO entry is DURABLE (freshness=1.0,
  # no decay). Sub-variants: "<edge_type>.<variant>" (SCORE tries the specific key, then the bare edge,
  # then no-decay). Keyed to the edges present in ontology.yaml.
  based-at.field: 30
  based-at.garrison: 540
  inducted-into.named-unit: 540          # possession-by-service is durable (omitted)
  imported-by.holdings: 900              # the transfer event itself is durable (omitted)
  supplies-component.tier-2-3: 540       # deep-tier supplier; revalidate on sanctions/tender/localization
  # supplies-component (prime), manufactures, equips, exported-by, design-authority-for, component-of -> DURABLE (omitted)
  replenishes.event: 3650                # a follow-on order having happened is durable-ish
  replenishes.implication: 900           # "still resupplying?" decays faster
  substitutable-by: 540                  # 18mo (authored default; no doc number)
  # sustained-by -> OMITTED (coarse rollup, not independently scored)
  # same-as, distinct-from, evidenced-by, corroborates, contradicts, supersedes, derived-from -> OMITTED (structural)

half_life_defaults:
  # Class-level fallback keyed by config/ontology.yaml `freshness_class` (spine/04:184-197). SCORE's
  # freshness lookup tries "<edge>.<variant>" -> bare "<edge>" -> THIS class default -> no-decay. It is
  # the fix for the dead `freshness_class` metadata (RCA SC-2): every edge declares a class, but half_lives_days
  # only carries VARIANT sub-keys for based-at/inducted-into/replenishes and nothing tags `freshness_variant`
  # on a claim, so those perishable/semi-durable edges fell through to no-decay and scored as ETERNAL. The
  # class default gives every claim on a decaying edge a reachable half-life; when it fires (no per-edge/variant
  # key matched) the claim is stamped `freshness-variant-assumed:<class>` in the provenance vector (we decayed
  # at the class rate, the variant was NOT tagged — honest, not silent). Keys MUST match the freshness_class
  # spellings in config/ontology.yaml (hyphenated: semi-durable, force-revalidated; n/a with a slash).
  perishable: 540           # D-P4.13: garrison rate (spine/04 based-at garrison = 18mo = 540d); the only value that keeps Rawalpindi stale AND Rahwali fresh on the corpus's real dates
  semi-durable: 540         # 18mo (spine/04 inducted-into named-unit = 18mo = 540d; matches the existing inducted-into.named-unit key)
  force-revalidated: 1825   # 5y clock (spine/04: overhauled-at / trained-by / software-controlled-by = 5y = 1825d)
  durable: null             # no decay (spine/04 durable class)
  n/a: null                 # structural edges — no decay

# INGEST attribution proposer (ingest/attribute.py) — offline, connection-triggered enrichment that turns an
# unattributed subject-blind VLM shape into a cited variant-identity `inference` claim D. Namespaced knobs on
# this surface (extra="allow", no F0-amendment; mirrors resolution.yaml's llm_candidate_gen). Model id is NOT
# here — it flows from the extraction client (client.model_id), same as imagery. Absent block => proposer stays
# dormant (no code-literal defaults). reference_source_classes uses source_class_factors keys (no "reference").
attribution_proposer:
  max_calls_per_rebuild: 8        # budget cap per enrichment pass; every non-firing candidate is logged
  log_skips: true
  candidate:
    presence_edge_types: [based-at, observed-at]                       # deployment + observed-occupancy edges the co-location hangs on
    reference_source_classes: [curated-register, think-tank, trade-media]  # what counts as fingerprint literature
    fingerprint_attrs: [site_signature_geometry, observable_fingerprint, equipment_fingerprint]  # geometry-bearing attrs
    variant_hop_edges: [inducted-into, equips]                         # 1-hop from the variant to reach unit/component fingerprints

# INGEST basing proposer (ingest/basing.py) — the ATTRIBUTION layer of the two-layer basing model
# (EVAL RCA D-P4.1/2/3). No source states "formation X is based at site Y"; sources state that equipment was
# OBSERVED AT a site (`observed-at`, the observed layer) and that equipment serves with a formation
# (`inducted-into`). This pass derives the missing `<unit, based-at, site>` edge from that pair as a cited
# `inference` claim carrying BOTH premises and the observation's valid time — offline, upstream of the append,
# never inside rebuild() (gate G1). Raise-only: it sets no status and no confidence, SCORE prices it, and an
# inference shares an independence group with its premises so it can never self-corroborate to confirmed.
# Unlike attribution_proposer this is a pure graph derivation — no model call, so it runs KEYLESS.
# Absent block => dormant (no code-literal defaults).
basing_proposer:
  occupancy_edge_types: [observed-at]     # the OBSERVED layer this reads (equipment seen at a site)
  formation_edge_types: [inducted-into]   # what associates that equipment with a named formation
  equipment_hop_edges: [equips]           # 1 hop from an observed COMPONENT to the variant that carries the association
  derived_edge: based-at                  # the lane the derived attribution is written on (must be declared in ontology.yaml)
  require_located_site: true              # only a site you can point to (coordinate or gazetteer match) can be a BASE — a province or an "air defence sector" is an area of operation, not a basing site (md/13 precision spec)
  max_units_per_site: 1                   # cap the attribution fan-out: the best-evidenced formation only, not every candidate
  max_claims_per_pass: 20                 # budget cap; every non-firing occupancy edge is logged with its reason

# INGEST in-document coreference (ingest/coref.py) — extraction pass 2. A second, scoped forced-tool call per
# document that groups mentions the document itself treats as one entity ("CPMIEC" / "the export agency"), each
# group licensed by a verbatim quote. Emits `coref-same-as` claims only; it never merges anything itself — the
# merge is derived at rebuild, so a split stays native.
#
# DORMANT BY DEFAULT — deliberately left commented out. Enabling it costs a SECOND extraction call per document
# and re-records every frozen bundle, while nothing consumes the clusters yet: RESOLVE does not honour
# `coref-same-as` until the reconciliation lands (it is not in resolve.scoring's identity predicates, so it is
# inert to merge scoring by design). Turn it on together with that honor policy, not before. With no extraction
# key it emits nothing rather than guessing, in any case.
#
# coreference:
#   # Which evidence kinds may be emitted. Drop UNAMBIGUOUS_ANAPHOR to run conservative (stated equivalences and
#   # name variants only) — anaphora is the highest-reach, highest-risk category. Order is not significance.
#   categories: [EXPLICIT_EQUIVALENCE, NAME_VARIANT, UNAMBIGUOUS_ANAPHOR]
#   max_mentions: 120             # cost guard: a document offering more mentions is skipped whole, never truncated
