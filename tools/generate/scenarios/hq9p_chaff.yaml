# ============================================================================
# SCENARIO SPEC (CHAFF tier) — hq9p_chaff
# The batch-2 triage-depth layer (09-corpus-sizing §0/§4): echoes, distractors,
# stale — the substrate the credibility soft-filter, subject-proximity funnel,
# too-clean/M4 detector, and freshness decay demonstrate AGAINST.
# Signal does NOT grow here; only chaff does. Combined corpus = primary + chaff.
#
# Mechanism-first (NOT a fraction of S): ~2+ per class, extended to a showcase
# volume. Each chaff unit MUST demonstrate its mechanism (P5) — echoes collapse,
# distractors sink/fall off-canvas, stale decays — or it proves nothing.
#
# LEGIBILITY CAVEAT (09 §5): at this volume the subject-proximity view-time filter
# becomes a REQUIRED build stage. Distractors here are LOW-PROXIMITY BY DESIGN so
# they sink via credibility even before that filter exists. Do NOT let any distractor
# introduce a 2nd supplier path for HT-233 (would flip the marquee chokepoint).
# ============================================================================

meta:
  name: hq9p_chaff
  subject: "Triage chaff around Pakistan HQ-9/P (echoes / distractors / stale / spoof)"
  tier: chaff

documents:
  # ---- ECHOES (D2) — extend the M4 burst; collapse into the d11 origin group ----
  - id: ce01_reshare_c
    source_class: social
    mode: chaff
    template: corpus/raw/social/x_osint_sightings.*
    date: "2025-05-11"
    asserts: ["third near-identical reshare of the recycled 'Rahwali deployment' image, new handle, same burst window"]
    corruption: [hype]
    deception: [echo_burst]
    registry: {reliability_grade: E, bias_vector: third-party, primary_origin_id: origin_parade_img, coordinated_inauthenticity_flag: true}
    expect: {note: "collapses into origin_parade_img group; no corroboration boost"}
    image: {kind: parade, source: fabricated, shared_id: parade_2019, integrity: synthetic}
  - id: ce02_reshare_d
    source_class: social
    mode: chaff
    template: corpus/raw/social/x_osint_sightings.*
    date: "2025-05-11"
    asserts: ["fourth near-identical reshare, another handle, minutes later"]
    corruption: [hype]
    deception: [echo_burst]
    registry: {reliability_grade: E, bias_vector: third-party, primary_origin_id: origin_parade_img, coordinated_inauthenticity_flag: true}
    expect: {note: "collapses into origin group; contributes to too-clean/coordination penalty"}
    image: {kind: parade, source: fabricated, shared_id: parade_2019, integrity: synthetic}
  - id: ce03_reshare_e
    source_class: social
    mode: chaff
    template: corpus/raw/social/x_osint_sightings.*
    date: "2025-05-12"
    asserts: ["fifth reshare of the same recycled image a day later, a new handle in the quote-tweet chain, with a DIVERGENT caption from the earlier posts (same image, different claimed location/status)"]
    corruption: [hype, date_format_flip]
    deception: [echo_burst]
    avoid: "Any reply or post that EXPOSES the recycling/coordination — no 'same frame reused across accounts', 'same wording within minutes', 'same pic being recycled', 'appears to be the same single frame', 'treat with caution'. The coordinated burst must stand RAW for the system to catch it. A vague non-conclusive 'source?' reply is fine; naming the reuse/echo mechanism is not."
    registry: {reliability_grade: E, bias_vector: third-party, primary_origin_id: origin_parade_img, coordinated_inauthenticity_flag: true}
    expect: {note: "6-post burst total (d11-d13 + ce01-ce03) = ONE look; captions DIVERGE over the same image; the system must detect the reuse itself"}
    image: {kind: parade, source: fabricated, shared_id: parade_2019, integrity: synthetic}

  # ---- DISTRACTORS (off-subject / low-proximity / resolver decoys) ----
  - id: cd01_s400_china
    source_class: trade_media
    mode: chaff
    off_subject: true
    template: corpus/raw/reference/wikipedia_s400.txt
    date: "2021-05"
    intent: "China's S-400 (SA-21 Triumf) deployment near the India border — a DIFFERENT system; the S-400 alias set overlaps nothing in the HQ-9 supply chain and must not link to it"
    avoid: "Any mention of HQ-9 at all, and any 'not to be confused with' / 'distinct from' / 'shares no common supply chain / seeker / launcher' disambiguation vs HQ-9. Write purely about the S-400; the reader notices the S-400≠HQ-9 distinction unaided."
    corruption: [alias_substitution, hedging]
    registry: {reliability_grade: C, bias_vector: third-party}
    expect: {note: "off-subject; S-400 aliases must NOT resolve into HQ-9/P; sinks on subject-proximity"}
  - id: cd02_india_s400
    source_class: official
    mode: chaff
