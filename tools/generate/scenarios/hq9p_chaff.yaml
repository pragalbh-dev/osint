    date: "2021-12"
    intent: "India's S-400 induction (PIB-style) — other country, other operator; a decoy for the shared S-400 designators"
    corruption: [hedging]
    registry: {reliability_grade: B, bias_vector: operator-state}
    expect: {note: "wrong country/operator; must not attach to the Pakistan HQ-9/P graph"}
  - id: cd03_pak_hq16
    source_class: trade_media
    mode: chaff
    off_subject: true
    template: corpus/raw/trade_media/quwa_hq9p.text.txt
    date: "2022-03"
    intent: "The document is ENTIRELY about Pakistan's LY-80 / HQ-16 MEDIUM-range SAM in service — its induction, batteries, and role. HQ-9/P may appear ONLY as a single bare passing mention of 'the longer-range tier' (one clause at most), NEVER with any operator / holding / fleet / battery-count / 'top tier provided by' claim about HQ-9/P."
    avoid: "Any self-debunk or disambiguation — 'not to be confused with', 'not interchangeable', 'analysts caution against conflating LY-80 with HQ-9/P', 'distinct in order-of-battle'. Also any SUBSTANTIVE HQ-9/P claim (operator, holdings, tier role, battery count) — keep HQ-9/P to at most one bare passing clause. The LY-80≠HQ-9/P distinction is left entirely for the reader."
    corruption: [alias_substitution, hedging]
    registry: {reliability_grade: C, bias_vector: third-party}
    expect: {note: "high subject-proximity but different system -> distinct-from; hardest distractor"}
  - id: cd04_civ_electronics
    source_class: customs
    mode: chaff
    off_subject: true
    template: corpus/raw/templates/importyeti_customs_template.*
    date: "2021-07"
    intent: "a genuinely CIVILIAN electronics import under HS 8526 (radar/nav apparatus) to an unrelated consumer-electronics consignee — an HS-code COLLISION with the d05 military manifest. Keep the 8528-vs-8526 HS-classification dispute (that IS the collision); leave civil-vs-military UNRESOLVED for the reader."
    avoid: "Any broker/analyst note that pre-resolves the civil-vs-military question — e.g. 'no association with any government or defence procurement entity', 'strictly consumer goods, not radar equipment'. The consignee being civilian must be inferable from the cargo/parties alone, never stated as a disclaimer."
    corruption: [hs_code_masking, ocr_garble, transliteration_drift]
    registry: {reliability_grade: C, bias_vector: commercial}
    expect: {note: "same HS code as d05 but civilian; relevance/relational match must NOT pull it into the supply chain"}
  - id: cd05_civ_notam
