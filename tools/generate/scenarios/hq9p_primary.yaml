worked_query:
  text: "Trace the HQ-9/P battery at Karachi back to its component supplier and name the chokepoint."
  expected_path: [site_karachi, unit_paad, var_hq9p, comp_ht233, mfr_casic]
  expected_path_edges:            # H-CONSIST-1: every consecutive pair IS edge-connected
    - {from: site_karachi, rel: based-at,          to: unit_paad}
    - {from: unit_paad,    rel: inducted-into,     to: var_hq9p}
    - {from: var_hq9p,     rel: supplies-component, to: comp_ht233}
    - {from: comp_ht233,   rel: manufactures,      to: mfr_casic}
  expected_answer: "Chokepoint = HT-233 engagement radar — CANDIDATE. CASIC/2nd Academy is the confirmed program design authority; the specific HT-233 maker is a Known Gap (best open-source candidate = CASIC 23rd Research Institute, inferred/unconfirmed per CASI 2025). Substitutability UNKNOWN → collection requirement, not a confirmed sole-source."
  must: "cite the exact source at every hop; separate observed (basing/imagery) from inferred (chokepoint candidacy)."

