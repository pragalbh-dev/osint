# Synthetic credibility rubric for the golden fixture. All numeric knobs live HERE, never in code
# (gate G6). The real values are DATA-C's / analyst-tuned; these are illustrative defaults.
factor_weights:
  authority: 0.35
  process: 0.25
  directness: 0.25
  track_record: 0.15
source_class_factors:
  curated-register: {authority: 0.9, process: 0.9, directness: 0.4, track_record: 0.5}
  satellite: {authority: 0.9, process: 0.9, directness: 0.9, track_record: 0.5}
  customs-tender: {authority: 0.6, process: 0.6, directness: 0.6, track_record: 0.5}
  social: {authority: 0.3, process: 0.2, directness: 0.6, track_record: 0.5}
integrity_penalties:
  recycled: 0.5
  too_clean: 0.8
  coordinated_inauthenticity: 0.4
thresholds:
  confirmed: 0.80
  probable: 0.50
# The supersession floor (D-P4.4 iv): what a NEWER assertion must clear before it may retire an older
# one. Below the bar the pair stays `candidate_supersede` → HITL. Absent block ⇒ fails closed.
supersede_floor:
  min_band: probable
  min_independent_looks: 1
  newer_status_allow: [probable, confirmed]
  blocking_gate_flags: [adversary-denial, decoy-risk, contradiction]
# SCORE resolver knobs (values in config, never code — gate G6).
decay_base: 2
min_independent_groups: 2
same_class_weight: 0.5
pdq_recycled_hamming: 10
aligned_bias_vectors: [operator-state, exporter-state]
disciplines: {satellite: IMINT}
gated_attrs: [foreign_control, readiness]
half_lives_days:
  based-at: 365
  fields: 540
  supplies-component: 1825
  operational-status: 90
